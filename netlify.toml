## Netlify config para este proyecto TanStack Start.
## Se fuerza Nitro en preset Netlify para generar el handler serverless y los
## estáticos en `dist/`. Netlify servirá archivos estáticos primero y enviará
## el resto de rutas al handler SSR.

[build]
  command = "npm install -g bun && bun install --frozen-lockfile && bun run build:deploy"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "netlify"
  NETLIFY = "true"
  BUN_VERSION = "1.1.38"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
