## Netlify config para este proyecto TanStack Start.
## La app no usa SSR ni server functions (todo es cliente + stores en memoria),
## así que desplegamos los estáticos generados por `vite build` y hacemos
## fallback SPA: cualquier ruta no-estática sirve index.html y el router de
## TanStack toma el control en el cliente.

[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: cualquier URL que no corresponda a un archivo estático
# devuelve index.html con status 200 (no 301/302) para que el router
# del cliente resuelva la ruta.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
